name: build dist

on:
  workflow_call:

permissions:
  contents: write

jobs:
  linux-build:
    if: false
    name: build on linux
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: apt update
      run: |
        sudo apt-get update
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
    - name: set up node
      uses: actions/setup-node@v4
      if: ${{ vars.AAP_JUCE_NODE_VERSION != '' }}
      with:
        node-version: ${{ vars.AAP_JUCE_NODE_VERSION }}
    - name: cache AVD
      uses: actions/cache@v4
      env:
        cache-name: cache-avd
      with:
        path: /home/runner/.android/gradle/avd
        key: ${{ runner.os }}-gradle-avd
    - name: cache gradle caches
      uses: actions/cache@v4
      env:
        cache-name: cache-gradle-caches
      with:
        path: /home/runner/.gradle/caches/
        key: ${{ runner.os }}-gradle-caches
    - name: apt install
      run: |
        echo y | sudo apt-get install xvfb wget unzip libc6 \
                 libcurl3-gnutls-dev  libfreetype6-dev libgcc1 libjpeg-dev \
                 libpng-dev libwebkit2gtk-4.1-dev libx11-6 \
                 libxext6 zlib1g  make g++ mesa-common-dev libasound2-dev \
                 libjack-jackd2-dev ladspa-sdk doxygen \
                 graphviz cmake ninja-build
    - name: build
      run: make build dist

  osx-build:
    name: build on osx
    runs-on: macos-14
    env:
      SIGNING_ENABLED: ${{ secrets.SIGNING_KEY_BASE64 != '' }}
    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
    - name: cache AVD
      uses: actions/cache@v4
      env:
        cache-name: cache-avd
      with:
        path: /Users/runner/.android/gradle/avd
        key: ${{ runner.os }}-gradle-avd
    - name: cache gradle caches
      uses: actions/cache@v4
      env:
        cache-name: cache-gradle-caches
      with:
        path: /Users/runner/.gradle/caches/
        key: ${{ runner.os }}-gradle-caches
    - name: Bump version
      uses: chkfung/android-version-actions@v1.2.1
      with:
        gradlePath: app/build.gradle
        versionCode: ${{github.run_number}}
    - name: install deps
      run: |
        brew install doxygen pkg-config coreutils ninja graphviz
    - name: build
      run: make build dist
    - name: Prepare app bundles for signing
      run: |
        mkdir -p "$RUNNER_TEMP/aab-to-sign"
        cp dist/*.aab "$RUNNER_TEMP/aab-to-sign/"
    - name: Sign app bundle
      if: env.SIGNING_ENABLED == 'true'
      uses: ilharp/sign-android-release@v2
      with:
        releaseDir: ${{ runner.temp }}/aab-to-sign
        signingKey: ${{ secrets.SIGNING_KEY_BASE64 }}
        keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
    - name: Restore app bundles
      if: env.SIGNING_ENABLED == 'true'
      run: |
        rm dist/*.aab
        mv "$RUNNER_TEMP/aab-to-sign"/*-signed.aab dist/
    - name: upload-artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: |
          dist/*-debug.apk
          dist/*.aab
    - name: Create Release
      uses: ncipollo/release-action@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        artifacts: dist/*-debug.apk,dist/*.aab
