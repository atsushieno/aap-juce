name: build dist

on:
  workflow_call:

permissions:
  contents: write

jobs:
  linux-build:
    if: false
    name: build on linux
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: apt update
      run: |
        sudo apt-get update
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
    - name: set up node
      uses: actions/setup-node@v4
      if: ${{ vars.AAP_JUCE_NODE_VERSION != '' }}
      with:
        node-version: ${{ vars.AAP_JUCE_NODE_VERSION }}
    - name: cache AVD
      uses: actions/cache@v4
      env:
        cache-name: cache-avd
      with:
        path: /home/runner/.android/gradle/avd
        key: ${{ runner.os }}-gradle-avd
    - name: cache gradle caches
      uses: actions/cache@v4
      env:
        cache-name: cache-gradle-caches
      with:
        path: /home/runner/.gradle/caches/
        key: ${{ runner.os }}-gradle-caches
    - name: apt install
      run: |
        echo y | sudo apt-get install xvfb wget unzip libc6 \
                 libcurl3-gnutls-dev  libfreetype6-dev libgcc1 libjpeg-dev \
                 libpng-dev libwebkit2gtk-4.1-dev libx11-6 \
                 libxext6 zlib1g  make g++ mesa-common-dev libasound2-dev \
                 libjack-jackd2-dev ladspa-sdk doxygen \
                 graphviz cmake ninja-build
    - name: build
      run: make build dist

  osx-build:
    name: build on osx
    runs-on: macos-14
    env:
      SIGNING_ENABLED: ${{ secrets.SIGNING_KEY_BASE64 != '' }}
    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin
    - name: cache AVD
      uses: actions/cache@v4
      env:
        cache-name: cache-avd
      with:
        path: /Users/runner/.android/gradle/avd
        key: ${{ runner.os }}-gradle-avd
    - name: cache gradle caches
      uses: actions/cache@v4
      env:
        cache-name: cache-gradle-caches
      with:
        path: /Users/runner/.gradle/caches/
        key: ${{ runner.os }}-gradle-caches
    # FIXME: we should make it standalone reusable action (it is a drop-in replacement script for an abandoned action in the market...)
    - name: Set Android version codes
      run: |
        node <<'NODE'
        const fs = require('node:fs');
        const path = require('node:path');

        const versionCode = '${{ github.run_number }}';
        const gradleFiles = [];

        function collectGradleFiles(directory) {
          for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
            if (entry.name === '.git' || entry.name === 'external')
              continue;

            const entryPath = path.join(directory, entry.name);
            if (entry.isDirectory())
              collectGradleFiles(entryPath);
            else if (entry.isFile() && (entry.name === 'build.gradle' || entry.name === 'build.gradle.kts'))
              gradleFiles.push(entryPath);
          }
        }

        function braceDelta(line) {
          return [...line].reduce((depth, character) =>
            depth + (character === '{' ? 1 : character === '}' ? -1 : 0), 0);
        }

        collectGradleFiles('.');

        for (const file of gradleFiles) {
          const source = fs.readFileSync(file, 'utf8');
          if (!/com\.android\.application/.test(source))
            continue;

          const lines = source.split(/\r?\n/);
          let defaultConfigLine = -1;
          let defaultConfigEndLine = -1;
          let depth = 0;

          for (let index = 0; index < lines.length; index++) {
            if (defaultConfigLine < 0 && /\bdefaultConfig\s*\{/.test(lines[index])) {
              defaultConfigLine = index;
              depth = braceDelta(lines[index]);
              continue;
            }

            if (defaultConfigLine >= 0) {
              depth += braceDelta(lines[index]);
              if (depth === 0) {
                defaultConfigEndLine = index;
                break;
              }
            }
          }

          if (defaultConfigLine < 0 || defaultConfigEndLine < 0)
            throw new Error(`Cannot find defaultConfig block in ${file}`);

          const assignment = file.endsWith('.kts') ? `versionCode = ${versionCode}` : `versionCode ${versionCode}`;
          let updated = false;
          for (let index = defaultConfigLine + 1; index < defaultConfigEndLine; index++) {
            if (/^\s*versionCode(?:\s*=)?\s+/.test(lines[index])) {
              lines[index] = `${lines[index].match(/^\s*/)[0]}${assignment}`;
              updated = true;
            }
          }

          if (!updated)
            lines.splice(defaultConfigLine + 1, 0, `${lines[defaultConfigLine].match(/^\s*/)[0]}    ${assignment}`);

          fs.writeFileSync(file, lines.join('\n'));
          console.log(`Set versionCode for ${file}`);
        }
        NODE
    - name: install deps
      run: |
        brew install doxygen pkg-config coreutils ninja graphviz
    - name: build
      run: make build dist
    - name: Prepare app bundles for signing
      run: |
        mkdir -p "$RUNNER_TEMP/aab-to-sign"
        cp dist/*.aab "$RUNNER_TEMP/aab-to-sign/"
    - name: Sign app bundle
      if: env.SIGNING_ENABLED == 'true'
      uses: ilharp/sign-android-release@v2
      with:
        releaseDir: ${{ runner.temp }}/aab-to-sign
        signingKey: ${{ secrets.SIGNING_KEY_BASE64 }}
        keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
    - name: Restore app bundles
      if: env.SIGNING_ENABLED == 'true'
      run: |
        rm dist/*.aab
        mv "$RUNNER_TEMP/aab-to-sign"/*-signed.aab dist/
    - name: upload-artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: |
          dist/*-debug.apk
          dist/*.aab
    - name: Create Release
      uses: ncipollo/release-action@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        artifacts: dist/*-debug.apk,dist/*.aab
